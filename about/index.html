<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Our PTO | Moore Elementary PTO</title>
  <link href="https://fonts.googleapis.com/css2?family=Baskervville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --gold:#ffc200;
      --orange:#db6d42;
      --navy:#0c1546;
      --navy-2:#1d2a66;
      --text:#172033;
      --muted:#667085;
      --bg:#f5f7fb;
      --bg-alt:#eef2f8;
      --paper:#fbfaf6;       /* warm off-white for editorial sections */
      --rule:#0c1546;
      --white:#ffffff;
      --max:1200px;
      --shadow-soft:0 10px 30px rgba(12,21,70,.07);
    }
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }
    html{
      scroll-behavior:smooth;
    }
    body{
      font-family:'Inter',sans-serif;
      background:var(--paper);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    img{
      max-width:100%;
      display:block;
    }
    a{
      color:inherit;
      text-decoration:none;
    }
    .container{
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;
    }
    .feature-kicker{
      display:inline-block;
      color:var(--orange);
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:.74rem;
      font-weight:700;
      margin-bottom:14px;
    }
    .section{
      padding:110px 0;
    }
    /* NAV — identical to home for brand consistency */
    .site-nav{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(12,21,70,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .nav-inner{
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;
      min-height:78px;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:20px;
    }
    .nav-left,
    .nav-right{
      display:flex;
      align-items:center;
      gap:26px;
    }
