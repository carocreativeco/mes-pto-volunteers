<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corporate Sponsor Form — Moore Elementary PTO</title>
  <link href="https://fonts.googleapis.com/css2?family=Baskervville:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root{
      --gold:#ffc200;
      --orange:#db6d42;
      --navy:#0c1546;
      --white:#ffffff;
      --max:1200px;
    }
    .site-nav{
      position:sticky;top:0;z-index:1000;
      background:rgba(12,21,70,.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .nav-inner{
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;min-height:78px;
      display:grid;grid-template-columns:1fr auto 1fr;
      align-items:center;gap:20px;
      font-family:'Inter',sans-serif;
    }
    .nav-left,.nav-right{display:flex;align-items:center;gap:26px}
    .nav-right{justify-content:flex-end}
    .nav-brand{display:flex;justify-content:center;align-items:center}
    .nav-brand a{display:block}
    .nav-brand img{width:80px;height:auto;max-height:52px;object-fit:contain;display:block}
    .nav-link{
      color:rgba(255,255,255,.9);font-size:.95rem;
      text-decoration:none;
    }
    .nav-link:hover{opacity:.78}
    .nav-cta{
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 18px;border-radius:999px;
      background:var(--gold);color:var(--navy);
      font-weight:700;font-size:.9rem;text-decoration:none;
    }
    .nav-toggle{
      display:none;border:none;background:none;
      color:var(--white);font-size:1.5rem;cursor:pointer;
    }
    .nav-mobile{
      display:none;
      width:min(var(--max), calc(100% - 40px));
      margin:0 auto;padding:0 0 18px;
      font-family:'Inter',sans-serif;
    }
    .nav-mobile.open{display:grid;gap:12px}
    .nav-mobile a{
      color:rgba(255,255,255,.92);
      font-size:.96rem;text-decoration:none;
    }
    @media (max-width:860px){
      .nav-left,.nav-right{display:none}
      .nav-toggle{display:block}
      .nav-inner{grid-template-columns:1fr auto}
      .nav-brand{justify-content:flex-start}
      .nav-brand img{width:72px;max-height:48px}
    }
    @media (max-width:640px){
      .nav-inner,.nav-mobile{width:min(var(--max), calc(100% - 24px))}
      .nav-brand img{width:64px;max-height:42px}
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <div class="nav-left">
        <a href="/about" class="nav-link">About</a>
        <a href="/#events" class="nav-link">Events</a>
        <a href="/#connect" class="nav-link">Connect</a>
      </div>

      <div class="nav-brand">
        <a href="/">
          <img src="/ptohome.png" alt="Moore Elementary PTO logo" onerror="this.style.display='none'" />
        </a>
      </div>

      <div class="nav-right">
        <a href="/sponsor/" class="nav-link">Become a sponsor</a>
        <a href="/volunteer/" class="nav-cta">Volunteer</a>
      </div>

      <button class="nav-toggle" aria-label="Toggle menu" onclick="document.getElementById('mobileMenu').classList.toggle('open')">&#9776;</button>
    </div>

    <div class="nav-mobile" id="mobileMenu">
      <a href="/about">About</a>
      <a href="/#events">Events</a>
      <a href="/#connect">Connect</a>
      <a href="/sponsor/">Become a sponsor</a>
      <a href="/volunteer/">Volunteer</a>
    </div>
  </nav>

  <div id="root"></div>

  <script type="text/babel" src="SponsorForm.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
